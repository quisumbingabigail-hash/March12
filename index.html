<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Engine Diagnostics</title>

<style>

body{
  margin:0;
  background:#0b0f14;
  color:#e6edf3;
  font-family:"Courier New", monospace;
  overflow:hidden;
}

/* rain effect */

.rain{
  position:fixed;
  width:100%;
  height:100%;
  pointer-events:none;
}

.drop{
  position:absolute;
  width:1px;
  height:90px;
  background:linear-gradient(transparent, rgba(120,170,255,0.6));
  animation:fall linear infinite;
}

@keyframes fall{
  from{transform:translateY(-120px);}
  to{transform:translateY(100vh);}
}

/* panel */

.panel{
  position:relative;
  z-index:2;
  width:460px;
  margin:120px auto;
  background:#11161d;
  border:1px solid #2d333b;
  border-radius:12px;
  padding:40px;
  text-align:center;
  box-shadow:0 0 25px rgba(0,0,0,0.7);
}

h1{
  color:#58a6ff;
  margin-bottom:8px;
}

.machine{
  color:#8b949e;
  margin-bottom:20px;
  font-size:14px;
}

.status{
  color:#8b949e;
}

.code{
  background:#0d1117;
  border:1px solid #30363d;
  border-radius:8px;
  padding:16px;
  margin-top:22px;
  color:#79c0ff;
  font-size:14px;
}

.footer{
  margin-top:20px;
  font-size:12px;
  color:#6e7681;
}

</style>
</head>

<body>

<div class="rain">
<script>
for(let i=0;i<65;i++){
  const drop=document.createElement("div");
  drop.className="drop";
  drop.style.left=Math.random()*100+"vw";
  drop.style.animationDuration=(0.8+Math.random()*1.6)+"s";
  drop.style.animationDelay=Math.random()*2+"s";
  document.currentScript.parentElement.appendChild(drop);
}
</script>
</div>

<div class="panel">

<h1>Engine Diagnostics</h1>
<p class="machine">Machine: A.B.B.Y.</p>

<p class="status">Running system check...</p>
<p class="status">Telemetry received.</p>

<div class="code">
U2xlZXAgRGVwcml2YXRpb24gYnkgQ2hhbmNlIFBlw7Fh
</div>

<p class="footer">diagnostic.log updated</p>

</div>

</body>
</html>
