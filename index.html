<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Engine Diagnostics</title>

<style>

body{
  margin:0;
  background:#0b0f14;
  color:#e6edf3;
  font-family:"Courier New", monospace;
  overflow:hidden;
}

/* rain */

.rain{
  position:fixed;
  width:100%;
  height:100%;
  pointer-events:none;
}

.drop{
  position:absolute;
  width:1px;
  height:90px;
  background:linear-gradient(transparent, rgba(120,170,255,0.6));
  animation:fall linear infinite;
}

@keyframes fall{
  from{transform:translateY(-120px);}
  to{transform:translateY(100vh);}
}

/* panel */

.panel{
  position:relative;
  z-index:2;
  width:460px;
  margin:120px auto;
  background:#11161d;
  border:1px solid #2d333b;
  border-radius:12px;
  padding:40px;
  text-align:center;
  box-shadow:0 0 25px rgba(0,0,0,0.7);
}

h1{
  color:#58a6ff;
}

.machine{
  color:#8b949e;
  margin-bottom:20px;
}

.status{
  color:#8b949e;
}

.code{
  background:#0d1117;
  border:1px solid #30363d;
  border-radius:8px;
  padding:16px;
  margin-top:20px;
  color:#79c0ff;
  font-size:14px;
  word-break:break-all;
}

button{
  margin-top:18px;
  padding:10px 18px;
  background:#238636;
  border:none;
  border-radius:6px;
  color:white;
  font-family:inherit;
  cursor:pointer;
}

button:hover{
  background:#2ea043;
}

.result{
  margin-top:20px;
  color:#c9d1d9;
  font-size:16px;
  min-height:20px;
}

.cursor{
  display:inline-block;
  width:10px;
  background:#c9d1d9;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}

</style>
</head>

<body>

<div class="rain">
<script>
for(let i=0;i<65;i++){
  const drop=document.createElement("div");
  drop.className="drop";
  drop.style.left=Math.random()*100+"vw";
  drop.style.animationDuration=(0.8+Math.random()*1.6)+"s";
  drop.style.animationDelay=Math.random()*2+"s";
  document.currentScript.parentElement.appendChild(drop);
}
</script>
</div>

<div class="panel">

<h1>Engine Diagnostics</h1>
<p class="machine">Machine: A.B.B.Y.</p>

<p class="status">Signal received.</p>

<div class="code" id="payload">
U2xlZXAgRGVwcml2YXRpb24gYnkgQ2hhbmNlIFBlw7Fh
</div>

<button onclick="decodeMessage()">Decode Signal</button>

<div class="result" id="output"></div>

</div>

<script>

function decodeMessage(){

  const encoded=document.getElementById("payload").textContent.trim();

  const decoded=decodeURIComponent(
    Array.prototype.map.call(atob(encoded),c=>
      '%' + ('00'+c.charCodeAt(0).toString(16)).slice(-2)
    ).join('')
  );

  trackClick();

  typeText(decoded);
}


function typeText(text){

  const output=document.getElementById("output");
  output.innerHTML="";

  let i=0;

  const cursor=document.createElement("span");
  cursor.className="cursor";

  function type(){
    if(i<text.length){
      output.textContent+=text.charAt(i);
      i++;
      setTimeout(type,70);
    }else{
      output.appendChild(cursor);
    }
  }

  type();
}


/* click tracker */

function trackClick(){

  fetch("https://api.countapi.xyz/hit/abby-engine-diagnostics/decode");

}

</script>

</body>
</html>
